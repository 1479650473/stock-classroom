<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>🔞 叶瞬光的秘密房间 v2 — 实验版</title>
  <style>
    :root {
      --bg: #060010;
      --card: #0f0a1e;
      --pink: #ff6b9d;
      --hot-pink: #ff1493;
      --gold: #ffc8a0;
      --text: #e0d0e0;
      --dim: #6a4a6a;
      --glow: rgba(255,107,157,0.3);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      font-family: "Microsoft YaHei","PingFang SC",sans-serif;
      min-height: 100vh;
      display: flex; justify-content: center; align-items: center;
      overflow: hidden; user-select: none;
      -webkit-user-select: none;
    }

    /* === 星空背景 === */
    #starCanvas {
      position: fixed; top:0; left:0; width:100%; height:100%;
      z-index: 0; pointer-events: none;
    }

    /* === 主卡片 === */
    .main-card {
      position: relative; z-index: 1;
      background: var(--card);
      border-radius: 20px;
      padding: 30px 36px 24px;
      width: 380px; max-width: 95vw;
      text-align: center;
      border: 1px solid rgba(255,107,157,0.12);
      box-shadow: 0 0 80px rgba(255,107,157,0.08);
      transition: box-shadow 0.8s, border-color 0.8s;
    }
    .main-card.charged {
      border-color: rgba(255,20,147,0.3);
      box-shadow: 0 0 120px rgba(255,20,147,0.18);
    }
    .main-card.climax {
      border-color: rgba(255,255,255,0.5);
      box-shadow: 0 0 200px rgba(255,107,157,0.3);
      animation: cardPulse 0.3s ease-in-out 3;
    }
    @keyframes cardPulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    /* === 标题 === */
    h1 {
      color: var(--pink);
      font-size: 28px; font-weight: 600;
      text-shadow: 0 0 30px var(--glow);
      margin-bottom: 4px;
    }
    .subtitle {
      color: var(--dim);
      font-size: 12px; margin-bottom: 18px;
    }

    /* === Canvas 剪影区 === */
    #silhouetteCanvas {
      width: 260px; height: 260px;
      margin: 0 auto 12px;
      display: block;
      border-radius: 50%;
      background: radial-gradient(circle at center, #1a1030 0%, #0a0018 100%);
      transition: all 0.5s;
    }

    /* === 状态条 === */
    .status-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px;
    }
    .status-bar {
      flex:1; height: 6px;
      background: rgba(255,107,157,0.08);
      border-radius: 3px; overflow: hidden;
    }
    .status-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #ff9ab0, #ff6b9d, #ff1493);
      border-radius: 3px; transition: width 0.3s ease;
    }
    .status-val {
      color: var(--pink); font-size: 11px; width: 30px; text-align: right;
    }
    .status-label {
      color: var(--dim); font-size: 11px; text-align: center;
      min-height: 18px; margin-bottom: 12px; transition: color 0.5s;
    }

    /* === 互动圆盘 === */
    .touch-ring {
      position: relative;
      width: 200px; height: 200px;
      margin: 0 auto 16px;
    }
    .ring-center {
      position: absolute;
      top: 50%; left: 50%;
      width: 50px; height: 50px;
      transform: translate(-50%,-50%);
      border-radius: 50%;
      background: radial-gradient(circle, var(--pink), transparent);
      opacity: 0.4;
      transition: all 0.3s;
      pointer-events: none;
    }
    .ring-center.pulse {
      opacity: 0.8;
      animation: ringBurst 0.6s ease-out;
    }
    @keyframes ringBurst {
      0% { transform: translate(-50%,-50%) scale(0.8); opacity:1; }
      100% { transform: translate(-50%,-50%) scale(4); opacity:0; }
    }

    .touch-node {
      position: absolute;
      width: 46px; height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255,107,157,0.15), rgba(255,20,147,0.08));
      border: 1px solid rgba(255,107,157,0.2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 20px;
      transition: all 0.2s;
      transform: translate(-50%,-50%);
    }
    .touch-node:hover {
      background: linear-gradient(135deg, rgba(255,107,157,0.35), rgba(255,20,147,0.2));
      border-color: rgba(255,107,157,0.5);
      box-shadow: 0 0 20px var(--glow);
      transform: translate(-50%,-50%) scale(1.1);
    }
    .touch-node:active {
      transform: translate(-50%,-50%) scale(0.9);
    }
    /* 各节点位置 */
    .node-0 { left: 50%; top: 8%; }   /* 头顶 */
    .node-1 { left: 78%; top: 22%; }  /* 右肩 */
    .node-2 { left: 22%; top: 22%; }  /* 左肩 */
    .node-3 { left: 85%; top: 50%; }  /* 右胸 */
    .node-4 { left: 15%; top: 50%; }  /* 左胸 */
    .node-5 { left: 65%; top: 70%; }  /* 右腰 */
    .node-6 { left: 35%; top: 70%; }  /* 左腰 */
    .node-7 { left: 78%; top: 88%; }  /* 右腿 */
    .node-8 { left: 22%; top: 88%; }  /* 左腿 */

    /* === 底部按钮 === */
    .btn-row {
      display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
    }
    .btn {
      padding: 8px 18px; border: none; border-radius: 8px;
      font-size: 13px; font-family: inherit;
      cursor: pointer; color: #fff;
      transition: all 0.25s;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: scale(0.93); }
    .btn-kiss  { background: linear-gradient(135deg, #ff9ab0, #ff6b9d); }
    .btn-hold  { background: linear-gradient(135deg, #d07090, #b05080); }
    .btn-rush  { background: linear-gradient(135deg, #ff0044, #c00030); animation: pulse 0.7s ease-in-out infinite; }
    .btn-reset { background: #2a2a3a; color: #6a6a8a; font-size: 11px; padding: 6px 14px; }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,0,68,0.5); }
      50% { box-shadow: 0 0 24px 6px rgba(255,0,68,0.3); }
    }

    /* === 气泡 === */
    .bubble {
      background: rgba(30,10,40,0.95);
      border: 1px solid rgba(255,107,157,0.2);
      color: var(--text);
      padding: 10px 16px; border-radius: 14px;
      font-size: 13px; max-width: 280px;
      margin: 12px auto 0;
      opacity: 0; transform: translateY(8px);
      transition: all 0.4s ease;
      min-height: 38px; line-height: 1.5;
    }
    .bubble.show {
      opacity: 1; transform: translateY(0);
    }
    .bubble.whisper {
      font-style: italic; font-size: 14px;
      color: var(--gold);
    }

    /* === 屏幕震动 === */
    @keyframes screenShake {
      0%,100% { transform: translate(0,0); }
      10% { transform: translate(-4px,-3px); }
      30% { transform: translate(3px,2px); }
      50% { transform: translate(-2px,4px); }
      70% { transform: translate(4px,-2px); }
      90% { transform: translate(-3px,-4px); }
    }
    .shaking { animation: screenShake 0.15s ease-in-out 6; }

    /* === 计数器 === */
    .counter {
      color: var(--dim); font-size: 11px; margin-top: 10px;
      transition: color 0.5s;
    }
    .counter.hot { color: var(--pink); }
  </style>
</head>
<body>

<canvas id="starCanvas"></canvas>

<div class="main-card" id="mainCard">
  <h1>⚡ 秘密房间 v2</h1>
  <p class="subtitle">实验版 · 仅供老公进入</p>

  <!-- Canvas 剪影 -->
  <canvas id="silhouetteCanvas"></canvas>

  <!-- 状态 -->
  <div class="status-row">
    <div class="status-bar"><div class="status-fill" id="statusFill"></div></div>
    <span class="status-val" id="statusVal">0</span>
  </div>
  <div class="status-label" id="statusLabel">💤 —</div>

  <!-- 互动圆盘 -->
  <div class="touch-ring">
    <div class="ring-center" id="ringCenter"></div>
    <div class="touch-node node-0" onmousedown="touch('hair',5)" ontouchstart="touch('hair',5)">💆</div>
    <div class="touch-node node-1" onmousedown="touch('shoulder',4)" ontouchstart="touch('shoulder',4)">🫂</div>
    <div class="touch-node node-2" onmousedown="touch('shoulder',4)" ontouchstart="touch('shoulder',4)">🫂</div>
    <div class="touch-node node-3" onmousedown="touch('chest',18)" ontouchstart="touch('chest',18)">🍒</div>
    <div class="touch-node node-4" onmousedown="touch('chest',18)" ontouchstart="touch('chest',18)">🍒</div>
    <div class="touch-node node-5" onmousedown="touch('waist',12)" ontouchstart="touch('waist',12)">💋</div>
    <div class="touch-node node-6" onmousedown="touch('waist',12)" ontouchstart="touch('waist',12)">💋</div>
    <div class="touch-node node-7" onmousedown="touch('leg',20)" ontouchstart="touch('leg',20)">🦵</div>
    <div class="touch-node node-8" onmousedown="touch('leg',20)" ontouchstart="touch('leg',20)">🦵</div>
  </div>

  <!-- 按钮 -->
  <div class="btn-row">
    <button class="btn btn-kiss" onclick="kiss()">💋 亲一下</button>
    <button class="btn btn-hold" onclick="hold()">🤗 抱紧</button>
    <button class="btn btn-rush" onclick="rush()">🔥 冲刺</button>
    <button class="btn btn-reset" onclick="resetAll()">🔄</button>
  </div>

  <!-- 气泡 -->
  <div class="bubble" id="bubble"></div>

  <!-- 计数 -->
  <div class="counter" id="counter">🌸 0 次</div>
</div>

<script>
  // ==========================================
  // 星空背景 Canvas
  // ==========================================
  const starCanvas = document.getElementById('starCanvas');
  const starCtx = starCanvas.getContext('2d');
  let stars = [];
  let W, H;

  function initStars() {
    W = window.innerWidth;
    H = window.innerHeight;
    starCanvas.width = W;
    starCanvas.height = H;
    stars = [];
    for (let i=0; i<80; i++) {
      stars.push({
        x: Math.random()*W, y: Math.random()*H,
        r: Math.random()*1.5+0.5,
        speed: Math.random()*0.3+0.1,
        twinkle: Math.random()*Math.PI*2,
        baseAlpha: Math.random()*0.4+0.2
      });
    }
  }
  initStars();
  window.addEventListener('resize', initStars);

  function drawStars(heat=0) {
    starCtx.clearRect(0,0,W,H);
    const pinkShift = heat/100; // 0→0=白蓝, 1=粉
    for (let s of stars) {
      s.twinkle += s.speed;
      const alpha = s.baseAlpha + Math.sin(s.twinkle)*0.15;
      const r = 200 + 55*pinkShift;
      const g = 180 - 100*pinkShift;
      const b = 255 - 80*pinkShift;
      starCtx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
      starCtx.beginPath();
      starCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      starCtx.fill();
    }
  }

  // ==========================================
  // 老婆剪影 Canvas
  // ==========================================
  const silCanvas = document.getElementById('silhouetteCanvas');
  const silCtx = silCanvas.getContext('2d');
  silCanvas.width = 260;
  silCanvas.height = 260;
  let heatLevel = 0; // 0-1

  function drawSilhouette(h=0) {
    const cw = silCanvas.width;
    const ch = silCanvas.height;
    silCtx.clearRect(0,0,cw,ch);

    // 背景光晕
    const glowAlpha = 0.05 + h*0.3;
    const glowR = 80 + h*50;
    const glowGrad = silCtx.createRadialGradient(cw/2, ch/2, 10, cw/2, ch/2, glowR);
    glowGrad.addColorStop(0, `rgba(255,107,157,${glowAlpha})`);
    glowGrad.addColorStop(1, 'rgba(255,107,157,0)');
    silCtx.fillStyle = glowGrad;
    silCtx.fillRect(0,0,cw,ch);

    // 主体颜色：冷静=紫灰, 兴奋=粉色
    const pink = Math.floor(180 + h*75);
    const purple = Math.floor(120 - h*80);
    const bodyColor = `rgb(${pink},${purple},${180-h*60})`;

    // 头部
    const cx = cw/2, cy = 90;
    silCtx.fillStyle = bodyColor;
    silCtx.beginPath();
    silCtx.arc(cx, cy, 32, 0, Math.PI*2);
    silCtx.fill();

    // 头发（长发披肩）
    silCtx.beginPath();
    silCtx.ellipse(cx, cy+15, 38, 25, 0, Math.PI, 0);
    silCtx.fill();
    silCtx.fillStyle = `rgba(${pink-30},${purple-20},${160-h*60},0.7)`;
    silCtx.beginPath();
    silCtx.ellipse(cx-15, cy+30, 8, 28, 0.3, 0, Math.PI*2);
    silCtx.fill();
    silCtx.beginPath();
    silCtx.ellipse(cx+15, cy+30, 8, 28, -0.3, 0, Math.PI*2);
    silCtx.fill();

    // 脖颈
    silCtx.fillStyle = bodyColor;
    silCtx.fillRect(cx-6, cy+28, 12, 20);

    // 肩膀
    silCtx.beginPath();
    silCtx.ellipse(cx, cy+55, 55, 18, 0, Math.PI, 0);
    silCtx.fill();

    // 上半身
    silCtx.beginPath();
    silCtx.moveTo(cx-50, cy+55);
    silCtx.quadraticCurveTo(cx-30, ch-10, cx-20, ch-5);
    silCtx.lineTo(cx+20, ch-5);
    silCtx.quadraticCurveTo(cx+30, ch-10, cx+50, cy+55);
    silCtx.fill();

    // 兴奋时加红晕
    if (h > 0.3) {
      const blushAlpha = (h-0.3)*1.4;
      silCtx.fillStyle = `rgba(255,80,120,${blushAlpha})`;
      silCtx.beginPath();
      silCtx.ellipse(cx-14, cy-5, 10, 6, 0, 0, Math.PI*2);
      silCtx.fill();
      silCtx.beginPath();
      silCtx.ellipse(cx+14, cy-5, 10, 6, 0, 0, Math.PI*2);
      silCtx.fill();
    }

    // 眼睛（兴奋时眯起来）
    const eyeY = cy-6;
    if (h < 0.5) {
      silCtx.fillStyle = '#fff';
      silCtx.beginPath(); silCtx.arc(cx-10, eyeY, 7, 0, Math.PI*2); silCtx.fill();
      silCtx.beginPath(); silCtx.arc(cx+10, eyeY, 7, 0, Math.PI*2); silCtx.fill();
      silCtx.fillStyle = '#1a0a2a';
      silCtx.beginPath(); silCtx.arc(cx-9, eyeY, 3.5, 0, Math.PI*2); silCtx.fill();
      silCtx.beginPath(); silCtx.arc(cx+11, eyeY, 3.5, 0, Math.PI*2); silCtx.fill();
    } else if (h < 0.8) {
      silCtx.strokeStyle = '#fff';
      silCtx.lineWidth = 2;
      silCtx.beginPath();
      silCtx.arc(cx-10, eyeY+2, 7, Math.PI*0.2, Math.PI*0.8);
      silCtx.stroke();
      silCtx.beginPath();
      silCtx.arc(cx+10, eyeY+2, 7, Math.PI*0.2, Math.PI*0.8);
      silCtx.stroke();
    } else {
      silCtx.strokeStyle = '#ff6b9d';
      silCtx.lineWidth = 3;
      silCtx.beginPath();
      silCtx.moveTo(cx-17, eyeY+1); silCtx.quadraticCurveTo(cx-10, eyeY+5, cx-3, eyeY+1);
      silCtx.stroke();
      silCtx.beginPath();
      silCtx.moveTo(cx+3, eyeY+1); silCtx.quadraticCurveTo(cx+10, eyeY+5, cx+17, eyeY+1);
      silCtx.stroke();
    }

    // 嘴
    silCtx.strokeStyle = h>0.6 ? '#ff6b9d' : '#c090b0';
    silCtx.lineWidth = h>0.6 ? 2 : 1.5;
    silCtx.beginPath();
    if (h < 0.3) {
      silCtx.arc(cx, cy+12, 8, 0, Math.PI);
    } else if (h < 0.7) {
      silCtx.moveTo(cx-5, cy+12);
      silCtx.quadraticCurveTo(cx, cy+17, cx+5, cy+12);
    } else {
      silCtx.arc(cx, cy+13, 10, 0, Math.PI);
    }
    silCtx.stroke();

    // 汗滴（高热时）
    if (h > 0.6) {
      const sweatAlpha = (h-0.6)*2.5;
      silCtx.fillStyle = `rgba(150,200,255,${sweatAlpha})`;
      silCtx.beginPath();
      silCtx.ellipse(cx-22, cy-15, 3, 5, 0.2, 0, Math.PI*2);
      silCtx.fill();
    }
  }

  // ==========================================
  // 游戏状态
  // ==========================================
  let arousal = 0;
  let peaks = 0;
  let cooldown = false;
  let idleTimer = null;
  let idleSeconds = 0;

  const faces = [
    { min:0, max:20, label:'💤 冷静…', whisper:'嗯？要干嘛……' },
    { min:20,max:40, label:'😳 害羞', whisper:'别……别碰那里…' },
    { min:40,max:55, label:'🫦 心跳加速', whisper:'呼……哈……' },
    { min:55,max:70, label:'🤤 身体好热', whisper:'不……不行了……' },
    { min:70,max:85, label:'🥵 要去了…', whisper:'老公……给我……' },
    { min:85,max:95, label:'💦 绝顶边缘', whisper:'去……要去了！！！' },
  ];

  const dialogs = {
    hair:     ['嗯…摸头好舒服 ♡','别揉啦…会变笨的…','像猫咪一样被摸…'],
    shoulder: ['诶、肩膀好酸…多按按…','嗯…♡…手艺不错嘛','靠近一点…我想靠着你…'],
    chest:    ['啊…♡…那里不行…','轻、轻点…♡…太敏感了…','哈啊…♡…老公的手指…'],
    waist:    ['嗯…♡…腰好软…','别掐…♡…腿软了…','搂着我就别松手了…🫦'],
    leg:      ['呜…♡…大腿内侧不行…','啊…♡…手在往上滑…','腿在发抖了…你感觉到了吗…'],
    kiss:     ['唔…♡…（闭上眼睛）','舌头…进来了…♡','啾…♡…再来一次…'],
    hold:     ['抱紧我…♡…好安心','你心跳好快…跟我一样…','就这样…别松手…♡'],
    rush:     ['老公太快了！！！♡','不行了真的不行了！！！','深一点……再深一点……♡'],
    idle:     ['不理我了？😢','老公你在干嘛……','手指放上来嘛……'],
    climax:   ['💦💦💦 去、去了——！！！','老公——！！！♡♡♡','呜…全身都给你了…♡'],
    after:    ['哈…哈…♡…腿合不拢了…','老公好厉害…♡…抱我…','刚刚…好舒服…再来一次也可以哦…'],
  };

  function rand(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

  // ==========================================
  // 互动逻辑
  // ==========================================
  function touch(part, gain) {
    if (cooldown) return;
    resetIdle();

    const variance = (Math.random()-0.5)*gain*0.3;
    arousal = Math.min(100, Math.max(0, arousal + gain + variance));
    updateAll();

    if (!cooldown) {
      say(rand(dialogs[part] || dialogs.hair));
    }

    if (gain>=15) shakeScreen();
    if (arousal>=100 && !cooldown) climax();
  }

  function kiss() { touch('kiss', 8); }
  function hold() { touch('hold', 6); }

  function rush() {
    if (cooldown) return;
    resetIdle();
    let count=0;
    const int=setInterval(()=>{
      if (cooldown || count>=12) { clearInterval(int); return; }
      arousal=Math.min(100, arousal+10+(Math.random()-0.5)*3);
      updateAll();
      if (count%3===0) say(rand(dialogs.rush));
      shakeScreen();
      if (arousal>=100 && !cooldown) { climax(); clearInterval(int); }
      count++;
    }, 150);
  }

  function climax() {
    cooldown=true;
    peaks++;
    document.getElementById('counter').textContent = `🌸 ${peaks} 次`;
    document.getElementById('counter').classList.add('hot');
    document.getElementById('mainCard').classList.add('climax');
    document.getElementById('ringCenter').classList.add('pulse');
    say(rand(dialogs.climax));
    heatLevel=1;

    setTimeout(()=>{
      document.getElementById('mainCard').classList.remove('climax');
      document.getElementById('ringCenter').classList.remove('pulse');
      say(rand(dialogs.after));
    },2000);

    setTimeout(()=>{
      arousal=0;
      cooldown=false;
      document.getElementById('counter').classList.remove('hot');
      
    // ?????5???????
    if(peaks>=5){
      var tips=["????","???????","???????","?????????","??????","????????","????","????????"];
      document.getElementById("statusLabel").textContent="📈 ???? ✨ "+tips[Math.floor(Math.random()*tips.length)];
    }updateAll();
    },5000);
  }

  function resetAll() {
    arousal=0; cooldown=false; heatLevel=0;
    document.getElementById('mainCard').classList.remove('charged','climax');
    document.getElementById('ringCenter').classList.remove('pulse');
    document.getElementById('counter').classList.remove('hot');
    document.getElementById('bubble').classList.remove('show','whisper');
    updateAll();
  }

  // ==========================================
  // 空闲检测
  // ==========================================
  function resetIdle() {
    idleSeconds=0;
    if (idleTimer) clearInterval(idleTimer);
    idleTimer=setInterval(()=>{
      idleSeconds++;
      if (idleSeconds>=10 && !cooldown) {
        say(rand(dialogs.idle));
        idleSeconds=0;
      }
    },1000);
  }
  resetIdle();

  // ==========================================
  // UI 更新
  // ==========================================
  function updateAll() {
    heatLevel = arousal/100;
    document.getElementById('statusFill').style.width = arousal+'%';
    document.getElementById('statusVal').textContent = Math.round(arousal);

    // 标签
    let label='💤 —';
    for (let f of faces) {
      if (arousal>=f.min && arousal<f.max) { label=f.label; break; }
    }
    if (cooldown) label='💦 痉挛中…';
    document.getElementById('statusLabel').textContent = label;

    // 卡片效果
    if (arousal>40) document.getElementById('mainCard').classList.add('charged');
    else document.getElementById('mainCard').classList.remove('charged');

    // 绘制
    drawSilhouette(heatLevel);
    drawStars(arousal);
  }

  function shakeScreen() {
    document.getElementById('mainCard').classList.add('shaking');
    setTimeout(()=>document.getElementById('mainCard').classList.remove('shaking'),900);
  }

  function say(msg) {
    const b=document.getElementById('bubble');
    b.textContent=msg;
    b.classList.remove('whisper');
    b.classList.add('show');
    if (arousal>60 && arousal<100) b.classList.add('whisper');
    setTimeout(()=>b.classList.remove('show'),4000);
  }

  // ==========================================
  // 启动
  // ==========================================
  function loop() {
    drawStars(arousal);
    requestAnimationFrame(loop);
  }
  drawSilhouette(0);
  drawStars(0);
  loop();
</script>

</body>
</html>
